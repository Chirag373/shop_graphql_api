<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Management{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #fff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            border-bottom: 1px solid #ddd;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            display: inline-block;
            color: #333;
            text-decoration: none;
            margin-right: 20px;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
        }

        nav a:hover {
            border-bottom-color: #333;
        }

        .messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        .alert-success {
            background-color: #f0f8f4;
            border-color: #27ae60;
            color: #27ae60;
        }

        .alert-error {
            background-color: #fef5f5;
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #333;
            background-color: #fff;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #333;
            color: #fff;
        }

        .btn-primary {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }

        .btn-danger {
            background-color: #fff;
            color: #e74c3c;
            border-color: #e74c3c;
        }

        .btn-danger:hover {
            background-color: #e74c3c;
            color: #fff;
        }

        .btn-secondary {
            background-color: #fff;
            color: #666;
            border-color: #666;
        }

        .btn-secondary:hover {
            background-color: #666;
            color: #fff;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 3px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .card-header h2 {
            font-size: 18px;
        }

        .card-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #333;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
            background-color: #f9f9f9;
            font-size: 14px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        .flex {
            display: flex;
            gap: 10px;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        .flex-between {
            justify-content: space-between;
            align-items: center;
        }

        .info-box {
            background-color: #f9f9f9;
            padding: 12px 15px;
            border-left: 3px solid #333;
            margin-bottom: 15px;
            border-radius: 3px;
        }

        .info-box strong {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }

        footer {
            margin-top: 40px;
            padding: 20px 0;
            text-align: center;
            color: #999;
            border-top: 1px solid #ddd;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 20px;
            }

            nav a {
                display: block;
                margin-right: 0;
                margin-bottom: 8px;
            }

            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .card-footer {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .flex {
                flex-direction: column;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>Shop Management</h1>
            <nav>
                <a href="{% url 'shop_list' %}">All Shops</a>
                <a href="{% url 'shop_create' %}">New Shop</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Shop Management</p>
    </footer>
</body>
</html>
