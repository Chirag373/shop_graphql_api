{% extends 'base.html' %}

{% block title %}{% if mode == 'create' %}Create Shop{% else %}Edit Shop{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{% if mode == 'create' %}New Shop{% else %}Edit Shop{% endif %}</h2>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Name *</label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                value="{% if shop %}{{ shop.name }}{% endif %}"
                required
            >
        </div>

        <div class="form-group">
            <label for="address">Address *</label>
            <textarea 
                id="address" 
                name="address" 
                required
            >{% if shop %}{{ shop.address }}{% endif %}</textarea>
        </div>

        <div class="form-group">
            <label for="emails">Emails</label>
            <input 
                type="text" 
                id="emails" 
                name="emails" 
                value="{% if emails_str %}{{ emails_str }}{% endif %}"
                placeholder="email1@example.com, email2@example.com"
            >
            <p class="form-hint">Separate with commas</p>
        </div>

        <div class="form-group">
            <label for="phones">Phone Numbers</label>
            <input 
                type="text" 
                id="phones" 
                name="phones" 
                value="{% if phones_str %}{{ phones_str }}{% endif %}"
                placeholder="+1 (555) 123-4567, +1 (555) 987-6543"
            >
            <p class="form-hint">Separate with commas</p>
        </div>

        <div class="card-footer">
            <a href="{% if mode == 'create' %}{% url 'shop_list' %}{% else %}{% url 'shop_detail' shop.id %}{% endif %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                {% if mode == 'create' %}Create{% else %}Update{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
