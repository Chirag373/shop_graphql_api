{% extends 'base.html' %}

{% block title %}Delete {{ shop.name }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <div class="card-header">
        <h2>Confirm Delete</h2>
    </div>

    <p style="margin-bottom: 20px;">Are you sure you want to delete this shop?</p>

    <div class="info-box" style="margin-bottom: 20px;">
        <strong>{{ shop.name }}</strong>
        <div style="margin-top: 8px; font-size: 13px;">{{ shop.address }}</div>
    </div>

    <p style="color: #e74c3c; margin-bottom: 20px; font-size: 13px;">This action cannot be undone.</p>

    <form method="POST" class="card-footer">
        {% csrf_token %}
        <a href="{% url 'shop_detail' shop.id %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-danger" onclick="return confirm('Permanently delete this shop?')">
            Delete
        </button>
    </form>
</div>
{% endblock %}
